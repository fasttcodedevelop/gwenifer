<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gwenniverse</title>
<link rel="icon" type="assets/Adobe Express - file (3) (2).png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png"> <!-- biar bagus juga kalau di-add ke home screen HP -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Great+Vibes&family=Parisienne&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- SCENE 1: LOADING -->
  <div class="scene active" id="scene-loading">
    <div class="load-ring">
      <div class="load-particles" id="load-particles"></div>
      <div class="load-flower" id="load-flower"></div>
    </div>
    <div class="load-text display">Sebentar, bunganya sedang mekar…</div>
    <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
    <div class="load-pct" id="load-pct">0%</div>
  </div>

  <!-- SCENE 2: PUZZLE -->
  <div class="scene" id="scene-puzzle">
    <div class="puzzle-wrap">
      <h1 class="display">Susun potongannya untuk membuka</h1>
      <p class="puzzle-sub">Semangat yaa duniakuu ><</p>
      <div class="puzzle-card">
  <div class="puzzle-grid" id="puzzle-grid"></div>
</div>

<div class="puzzle-preview">
    <img id="puzzle-preview-thumb" class="preview-thumb" alt="Preview">
    <span>GAMBAR UTUH</span>
</div>

<button class="ghost-btn" id="puzzle-skip">Aku menyerah, buka langsung</button>
    </div >
  </div>

  <!-- SCENE 3: HEART FORMATION -->
  <div class="scene" id="scene-heart">
    <div id="heart-field"></div>
    <div id="heart-caption">
      <h1 class="display">For gwennifer</h1>
      <p>From your ocean</p>
    </div>
  </div>

  <!-- SCENE 4: ORBIT -->
  <div class="scene" id="scene-orbit">
    <div id="orbit-stars"></div>
    <div id="comet-layer"></div>
    <!-- planet "jauh": gede, blur tebal, opacity rendah -->
<div class="planet" data-depth="0.12" style="width:260px;height:260px;top:-90px;right:-80px;background:radial-gradient(circle at 35% 35%,#c98a6b,transparent 70%);filter:blur(3px);opacity:.5;"></div>
<div class="planet" data-depth="0.14" style="width:200px;height:200px;bottom:-60px;left:-60px;background:radial-gradient(circle at 35% 35%,#8a4a5c,transparent 70%);filter:blur(3px);opacity:.4;"></div>
<div class="planet" data-depth="0.09" style="width:320px;height:320px;top:42%;left:-170px;background:radial-gradient(circle at 30% 30%,#5c2f4a,transparent 65%);filter:blur(5px);opacity:.28;"></div>

<!-- nebula: cahaya kabut tipis yang bergerak sangat pelan di belakang bintang -->
<div class="nebula" style="width:520px;height:420px;top:-10%;left:5%;background:radial-gradient(circle,#e88fa7,transparent 70%);opacity:.14;animation-delay:0s;"></div>
<div class="nebula" style="width:460px;height:460px;bottom:-15%;right:0;background:radial-gradient(circle,#aa8ad9,transparent 70%);opacity:.12;animation-delay:-13s;"></div>

<!-- planet "dekat": kecil, tajam, lebih terang -->
<!-- <div class="planet" style="width:64px;height:64px;top:13%;right:9%;background:radial-gradient(circle at 40% 40%,#e8b86a,transparent 70%);filter:blur(0px);opacity:.85;"></div> -->
<div class="planet" data-depth="0.35" style="width:40px;height:40px;bottom:24%;left:11%;background:radial-gradient(circle at 40% 40%,#aa8ad9,transparent 70%);filter:blur(0px);opacity:.9;"></div>
<div class="planet" data-depth="0.42" style="width:28px;height:28px;top:66%;right:17%;background:radial-gradient(circle at 40% 40%,#f0bd8a,transparent 70%);filter:blur(0px);opacity:.95;"></div>
    <div class="orbit-wrap">
      <div class="orbit-header">
        <div class="eyebrow">gwenniverse</div>
        <h1 class="display">Semesta kecil Gwen</h1>
      </div>
      <div class="orbit-ring ring-back"></div>
      <div class="heart-core" id="heart-core"></div>
      <div class="orbit-ring ring-front"></div>
      <div id="orbit-items"></div>
      <div class="orbit-instruction">Gwen, pencet tiap objek yang mengelilingi hati itu yaa</div>
    </div>
    <div class="sound-toggle" id="sound-toggle"></div>
    <div class="letter-toggle" id="letter-toggle"></div>
  </div>

  <!-- SCENE 5: LETTER (closing scene, opened via the envelope button in orbit) -->
  <div class="scene" id="scene-letter">
    <div id="letter-stars"></div>
    <div id="letter-content"></div>
  </div>

  <!-- FULL-SCREEN FLOWER TRANSITION OVERLAY -->
  <div id="flower-transition"></div>

</div>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal-box">
    <button id="modal-close"></button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
